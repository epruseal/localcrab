version: "3.9"

services:
  neo4j:
    image: neo4j:5
    container_name: opencrab-neo4j
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/opencrab
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: opencrab-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: opencrab
      MONGO_INITDB_DATABASE: opencrab
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: opencrab-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: opencrab
      POSTGRES_PASSWORD: opencrab
      POSTGRES_DB: opencrab
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opencrab -d opencrab"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: opencrab-chromadb
    ports:
      - "8000:8000"
    environment:
      CHROMA_SERVER_HOST: 0.0.0.0
      CHROMA_SERVER_HTTP_PORT: 8000
      ANONYMIZED_TELEMETRY: "False"
      ALLOW_RESET: "True"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      # The Chroma image does not ship curl/wget. Use bash's /dev/tcp support
      # so docker compose can reliably gate API/Web startup on Chroma readiness.
      test:
        [
          "CMD-SHELL",
          "bash -ec \"exec 3<>/dev/tcp/127.0.0.1/8000 && printf 'GET /api/v2/heartbeat HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -n 1 <&3 | grep -q '200'\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: opencrab-api
    ports:
      - "8001:8001"
    environment:
      STORAGE_MODE: docker
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OPENCRAB_API_KEY: ${OPENCRAB_API_KEY:-local-opencrab-key}
      OPENCRAB_TIER: ${OPENCRAB_TIER:-free}
      OPENCRAB_CORS_ORIGINS: ${OPENCRAB_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-opencrab}
      MONGODB_URI: mongodb://root:opencrab@mongodb:27017/opencrab?authSource=admin
      MONGODB_DB: ${MONGODB_DB:-opencrab}
      POSTGRES_URL: postgresql://opencrab:opencrab@postgres:5432/opencrab
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      CHROMA_COLLECTION: ${CHROMA_COLLECTION:-opencrab_vectors}
      PORT: 8001
    depends_on:
      neo4j:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: opencrab-web
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
      NEXT_PUBLIC_OPENCRAB_API_KEY: ${NEXT_PUBLIC_OPENCRAB_API_KEY:-local-opencrab-key}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-pk_test_replace_me}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-sk_test_replace_me}
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  mongo_data:
  postgres_data:
  chroma_data:

networks:
  default:
    name: opencrab-network
